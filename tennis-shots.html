<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Court Diagram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: #0d1117;
color: #e8e0d0;
font-family: ‘DM Mono’, monospace;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 24px 16px 40px;
}

h1 {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 2.2rem;
letter-spacing: 0.12em;
color: #c8f04a;
margin-bottom: 4px;
}

.subtitle {
font-size: 0.72rem;
color: #6b7280;
letter-spacing: 0.15em;
text-transform: uppercase;
margin-bottom: 24px;
}

.tabs {
display: flex;
gap: 8px;
margin-bottom: 20px;
flex-wrap: wrap;
justify-content: center;
}

.tab {
background: #1a1f2e;
border: 1px solid #2a3040;
color: #9ca3af;
font-family: ‘DM Mono’, monospace;
font-size: 0.72rem;
letter-spacing: 0.08em;
padding: 6px 16px;
cursor: pointer;
transition: all 0.18s;
text-transform: uppercase;
}

.tab:hover { border-color: #c8f04a; color: #c8f04a; }
.tab.active { background: #c8f04a; color: #0d1117; border-color: #c8f04a; font-weight: 600; }

.court-wrap {
position: relative;
width: 340px;
}

svg#court {
width: 340px;
height: 580px;
display: block;
}

.legend {
margin-top: 20px;
width: 340px;
background: #141921;
border: 1px solid #1e2535;
padding: 14px 16px;
}

.legend-title {
font-size: 0.65rem;
letter-spacing: 0.18em;
text-transform: uppercase;
color: #c8f04a;
margin-bottom: 10px;
}

.legend-item {
display: flex;
align-items: flex-start;
gap: 10px;
margin-bottom: 8px;
font-size: 0.7rem;
color: #9ca3af;
line-height: 1.5;
}

.legend-item .key {
color: #e8e0d0;
min-width: 80px;
font-size: 0.68rem;
}

.move-label {
font-size: 0.62rem;
fill: #e8e0d0;
font-family: ‘DM Mono’, monospace;
}

.annotation {
font-size: 0.58rem;
fill: #9ca3af;
font-family: ‘DM Mono’, monospace;
}
</style>

</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="showPlay('setup')">Setup</button>
  <button class="tab" onclick="showPlay('A_star_R')">A→★R</button>
  <button class="tab" onclick="showPlay('A_tri_R')">A→△R</button>
  <button class="tab" onclick="showPlay('A_star_L')">A→★L</button>
  <button class="tab" onclick="showPlay('A_dia_R')">A→◇</button>
  <button class="tab" onclick="showPlay('A_sq_R')">A→□</button>
  <button class="tab" onclick="showPlay('B_star_R')">B→★R</button>
  <button class="tab" onclick="showPlay('BC_tri_R')">B/C→△R</button>
</div>

<div class="court-wrap">
  <svg id="court" viewBox="0 0 340 580">
    <!-- Court surface -->
    <rect x="30" y="20" width="280" height="460" fill="#1a5276" rx="2"/>
    <!-- Outer boundary -->
    <rect x="30" y="20" width="280" height="460" fill="none" stroke="#e8e0d0" stroke-width="2.5"/>

```
<!-- Singles sidelines -->
<line x1="70" y1="20" x2="70" y2="480" stroke="#e8e0d0" stroke-width="1.5"/>
<line x1="270" y1="20" x2="270" y2="480" stroke="#e8e0d0" stroke-width="1.5"/>

<!-- Net -->
<line x1="30" y1="250" x2="320" y2="250" stroke="#e8e0d0" stroke-width="3"/>
<!-- Net posts -->
<rect x="27" y="245" width="6" height="10" fill="#e8e0d0"/>
<rect x="317" y="245" width="6" height="10" fill="#e8e0d0"/>
<!-- Net zig-zag -->
<polyline points="30,250 50,255 70,250 90,255 110,250 130,255 150,250 170,255 190,250 210,255 230,250 250,255 270,250 290,255 310,250 320,250" fill="none" stroke="#a0aec0" stroke-width="1"/>

<!-- Service boxes -->
<line x1="70" y1="360" x2="270" y2="360" stroke="#e8e0d0" stroke-width="1.5"/>
<line x1="70" y1="140" x2="270" y2="140" stroke="#e8e0d0" stroke-width="1.5"/>
<line x1="170" y1="140" x2="170" y2="360" stroke="#e8e0d0" stroke-width="1.5"/>

<!-- Position notes — outside court, below circles -->
<text x="230" y="510" text-anchor="middle" fill="#c8f04a" font-size="7" font-family="DM Mono, monospace">forehand open stand, or</text>
<text x="230" y="521" text-anchor="middle" fill="#c8f04a" font-size="7" font-family="DM Mono, monospace">attack/defend moguel</text>
<text x="110" y="510" text-anchor="middle" fill="#60a5fa" font-size="7" font-family="DM Mono, monospace">backhand open stand, or</text>
<text x="110" y="521" text-anchor="middle" fill="#60a5fa" font-size="7" font-family="DM Mono, monospace">attack/defend moguel</text>

<!-- === PLAYER MARKERS on baseline === -->
<!-- Position A: deuce side -->
<g id="pos_A">
  <circle cx="230" cy="487" r="14" fill="#c8f04a" fill-opacity="0.15" stroke="#c8f04a" stroke-width="2"/>
  <text x="230" y="491" text-anchor="middle" fill="#c8f04a" font-size="13" font-family="Bebas Neue, sans-serif">A</text>
</g>
<!-- Position B: ad side -->
<g id="pos_B">
  <circle cx="110" cy="487" r="14" fill="#60a5fa" fill-opacity="0.15" stroke="#60a5fa" stroke-width="2"/>
  <text x="110" y="491" text-anchor="middle" fill="#60a5fa" font-size="13" font-family="Bebas Neue, sans-serif">B</text>
</g>
<!-- Position C: center -->
<g id="pos_C">
  <circle cx="170" cy="487" r="14" fill="#f472b6" fill-opacity="0.15" stroke="#f472b6" stroke-width="2"/>
  <text x="170" y="491" text-anchor="middle" fill="#f472b6" font-size="13" font-family="Bebas Neue, sans-serif">C</text>
</g>

<!-- Target markers: ★ and △ on opponent's side (above net) -->
<!-- ★L = leftmost, on service line (y=360) -->
<g id="star_L">
  <text x="100" y="368" text-anchor="middle" fill="#fbbf24" font-size="22">★</text>
  <text x="100" y="356" text-anchor="middle" fill="#fbbf24" font-size="8" font-family="DM Mono">L</text>
</g>
<!-- ★R = middle of right service box, on service line -->
<g id="star_R">
  <text x="220" y="368" text-anchor="middle" fill="#fbbf24" font-size="22">★</text>
  <text x="220" y="356" text-anchor="middle" fill="#fbbf24" font-size="8" font-family="DM Mono">R</text>
</g>
<!-- △R = service line meets right singles sideline (270, 360) -->
<g id="tri_R">
  <polygon points="270,350 262,368 278,368" fill="none" stroke="#fb923c" stroke-width="2"/>
  <text x="270" y="344" text-anchor="middle" fill="#fb923c" font-size="8" font-family="DM Mono">R</text>
</g>

<!-- ◇ = center of right baseline zone (x=220, y=420) -->
<g id="dia_R">
  <polygon points="220,408 232,420 220,432 208,420" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="220" y="403" text-anchor="middle" fill="#34d399" font-size="8" font-family="DM Mono">◇</text>
</g>

<!-- □ = center of right service box (x=220, y=305) -->
<g id="sq_R">
  <rect x="210" y="295" width="20" height="20" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <text x="220" y="289" text-anchor="middle" fill="#a78bfa" font-size="8" font-family="DM Mono">□</text>
</g>

<!-- === ARROWS (shown per play) === -->
<g id="arrows"></g>

<!-- Play description text -->
<text id="play_title" x="170" y="472" text-anchor="middle" fill="#c8f04a" font-size="9" font-family="DM Mono, monospace" letter-spacing="1"></text>
```

  </svg>
</div>

<div class="legend" id="legend_box"></div>

<script>
const plays = {
  setup: {
    title: '',
    arrows: [],
    legend: []
  },
  A_star_R: {
    title: 'A → ★R  ·  2nd STEP CROSS-COURT',
    arrows: [
      { x1: 230, y1: 473, x2: 220, y2: 355, color: '#c8f04a', dash: false },
    ],
    legend: []
  },
  A_tri_R: {
    title: 'A → △R  ·  SHORT CROSS / CROSS-COURT',
    arrows: [
      { x1: 230, y1: 473, x2: 270, y2: 355, color: '#fb923c', dash: false },
    ],
    legend: []
  },
  A_star_L: {
    title: 'A → ★L  ·  BACKHAND PACKAGE',
    arrows: [
      { x1: 230, y1: 473, x2: 105, y2: 355, color: '#fbbf24', dash: true },
    ],
    legend: [
      ['Shot', 'Backhand 2nd step or backhand scissors shots'],
    ]
  },
  A_dia_R: {
    title: 'A → ◇  ·  BASELINE DROP SHOT',
    arrows: [
      { x1: 230, y1: 473, x2: 220, y2: 433, color: '#34d399', dash: false },
    ],
    legend: [
      ['Shot', 'Baseline drop shot'],
      ['Tip 1', 'Prepare racquet way back and high'],
      ['Tip 2', 'Body parallel to net'],
      ['Tip 3', 'Drive the ball'],
      ['Tip 4', 'Finish racquet low and pass the left leg'],
    ]
  },
  A_sq_R: {
    title: 'A → □  ·  HORIZON DROP SHOT, SLICE (?)',
    arrows: [
      { x1: 230, y1: 473, x2: 220, y2: 316, color: '#a78bfa', dash: false },
    ],
    legend: [
      ['Shot', 'Horizon drop shot, slice (?)'],
      ['Tip 1', 'Prepare racquet way back and high'],
      ['Tip 2', 'Body parallel to net'],
      ['Tip 3', 'Drive the ball'],
      ['Tip 4', 'Finish racquet overturn above net'],
    ]
  },
  B_star_R: {
    title: 'B → ★R  ·  HOP AND FLIP',
    arrows: [
      { x1: 110, y1: 473, x2: 220, y2: 355, color: '#60a5fa', dash: false },
    ],
    legend: [
      ['Shot', 'Hop and flip down the line'],
    ]
  },
  BC_tri_R: {
    title: 'B/C → △R  ·  LATERAL MOGUEL HOP',
    arrows: [
      { x1: 110, y1: 473, x2: 265, y2: 355, color: '#fb923c', dash: false },
      { x1: 170, y1: 473, x2: 268, y2: 355, color: '#f472b6', dash: true },
    ],
    legend: [
      ['Shot', 'Lateral moguel hop'],
    ]
  },
};


function arrow(svg, x1, y1, x2, y2, color, dashed) {
  const id = 'arr_' + Math.random().toString(36).slice(2);
  const defs = svg.querySelector('defs') || svg.insertBefore(document.createElementNS('http://www.w3.org/2000/svg','defs'), svg.firstChild);
  const marker = document.createElementNS('http://www.w3.org/2000/svg','marker');
  marker.setAttribute('id', id);
  marker.setAttribute('markerWidth','8');
  marker.setAttribute('markerHeight','8');
  marker.setAttribute('refX','6');
  marker.setAttribute('refY','3');
  marker.setAttribute('orient','auto');
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points','0 0, 6 3, 0 6');
  poly.setAttribute('fill', color);
  marker.appendChild(poly);
  defs.appendChild(marker);

  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1', x1); line.setAttribute('y1', y1);
  line.setAttribute('x2', x2); line.setAttribute('y2', y2);
  line.setAttribute('stroke', color);
  line.setAttribute('stroke-width', '2.5');
  line.setAttribute('marker-end', `url(#${id})`);
  if (dashed) line.setAttribute('stroke-dasharray','6,4');
  return line;
}

function showPlay(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    if (t.getAttribute('onclick').includes(`'${name}'`)) t.classList.add('active');
  });

  const play = plays[name];
  const arrowG = document.getElementById('arrows');
  arrowG.innerHTML = '';

  // Highlight relevant elements
  const allTargets = ['star_R','star_L','tri_R','sq_R','dia_R','pos_A','pos_B','pos_C'];
  allTargets.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.opacity = '0.25';
  });

  const highlightMap = {
    setup: ['star_R','star_L','tri_R','sq_R','dia_R','pos_A','pos_B','pos_C'],
    A_star_R: ['pos_A','star_R'],
    A_tri_R: ['pos_A','tri_R'],
    A_star_L: ['pos_A','star_L'],
    A_dia_R: ['pos_A','dia_R'],
    A_sq_R: ['pos_A','sq_R'],
    B_star_R: ['pos_B','star_R'],
    BC_tri_R: ['pos_B','pos_C','tri_R'],
  };

  (highlightMap[name] || []).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.opacity = '1';
  });

  play.arrows.forEach(a => {
    arrowG.appendChild(arrow(document.getElementById('court'), a.x1, a.y1, a.x2, a.y2, a.color, a.dash));
  });

  document.getElementById('play_title').textContent = '';

  // Update legend
  const box = document.getElementById('legend_box');
  box.innerHTML = `<div class="legend-title">${play.title || 'Ideal Shots'}</div>`;
  play.legend.forEach(([k, v]) => {
    box.innerHTML += `<div class="legend-item"><span class="key">${k}</span><span>${v}</span></div>`;
  });
}

showPlay('setup');
</script>

</body>
</html>
